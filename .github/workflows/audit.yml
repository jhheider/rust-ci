name: Security Audit

# Reusable cargo-audit via the prebuilt rustsec action - no `cargo install
# cargo-audit` compile on every run. Callers wire up the schedule/dispatch
# trigger; advisories rarely change between commits, so weekly is plenty.
on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner for the audit job. Use "self-hosted" for a private repo; keep the default for public repos.'
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  audit:
    name: cargo audit
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
