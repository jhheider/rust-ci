name: selftest-release

# Throwaway: dispatch-only harness to prove the reusable release.yml LOADS
# (passes reusable-workflow validation) without minting a real release. The
# build step will fail here (rust-ci has no Cargo project), which is fine; we
# only care that the run gets PAST startup into the build job.
on:
  workflow_dispatch: {}

# Callers must grant what release.yml needs; the reusable does not (and cannot)
# request more permission than the caller holds.
permissions:
  contents: write

jobs:
  # Binary path: the build job starts (then fails, no Cargo project here,
  # which is fine; we only prove the reusable loads past startup).
  r:
    uses: ./.github/workflows/release.yml
    with:
      bin-name: dummy
      targets: '{"include":[{"os":"ubuntu-latest","target":"aarch64-unknown-linux-musl","asset":"dummy.tar.gz"}]}'
    secrets: inherit

  # Library-only path: no bin-name/targets. The build job must SKIP (not fail),
  # and publish-crates is gated off on workflow_dispatch. Proves the lib-only
  # wiring loads and the empty-matrix build is skipped, not errored.
  lib:
    uses: ./.github/workflows/release.yml
    with:
      publish-crates: true
      crates: dummy-lib
    secrets: inherit
