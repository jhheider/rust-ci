name: selftest-release

# Throwaway: dispatch-only harness to prove the reusable release.yml LOADS
# (passes reusable-workflow validation) without minting a real release. The
# build step will fail here (rust-ci has no Cargo project) - that is fine; we
# only care that the run gets PAST startup into the build job.
on:
  workflow_dispatch: {}

# Callers must grant what release.yml needs; the reusable does not (and cannot)
# request more permission than the caller holds.
permissions:
  contents: write

jobs:
  r:
    uses: ./.github/workflows/release.yml
    with:
      bin-name: dummy
      targets: '{"include":[{"os":"ubuntu-latest","target":"aarch64-unknown-linux-musl","asset":"dummy.tar.gz"}]}'
    secrets: inherit
