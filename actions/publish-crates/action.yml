name: "Publish crates"
description: "Publish workspace crates in dependency order, skipping any version already on crates.io."

inputs:
  crates:
    description: "Crate names in dependency order (whitespace or newline separated). Single-crate repos pass one name."
    required: true
  token:
    description: "crates.io API token."
    required: true

runs:
  using: "composite"
  steps:
    # Publishes only crates whose current version is not already on crates.io,
    # in the given dependency order, waiting for the index between each. This
    # publishes exactly what a release bumped; a crate changed without a version
    # bump (e.g. a test-only edit) stays put. `cargo publish` is used directly
    # because katyo/publish-crates aborts the whole run when any crate has
    # unpublished changes without a bump.
    - shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.token }}
        CRATES: ${{ inputs.crates }}
      run: |
        set -euo pipefail
        ua="rust-ci publish-crates action"
        on_registry() { # crate ver -> success if that version is on crates.io
          [ "$(curl -s -o /dev/null -w '%{http_code}' -A "$ua" \
              "https://crates.io/api/v1/crates/$1/$2")" = "200" ]
        }
        for c in $CRATES; do
          ver=$(cargo metadata --no-deps --format-version 1 \
            | jq -r --arg c "$c" '.packages[] | select(.name==$c) | .version')
          if on_registry "$c" "$ver"; then
            echo "$c $ver already on crates.io - skip"
            continue
          fi
          echo "publishing $c $ver"
          cargo publish -p "$c"
          echo "waiting for $c $ver to appear on the index..."
          for _ in $(seq 1 60); do on_registry "$c" "$ver" && break; sleep 5; done
        done
