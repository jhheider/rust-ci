name: Release

# Reusable release: build a binary per target, attach to the GitHub Release,
# then optionally publish crates and refresh a Homebrew tap formula. Callers
# wire `on: release: [published]` (and optionally a workflow_dispatch that
# passes `tag:` to rebuild an existing release). Everything a given repo does
# not need (docs, extra files, crates, tap) stays off by default.
on:
  workflow_call:
    inputs:
      bin-name:
        description: 'The built binary name (without extension).'
        type: string
        required: true
      targets:
        description: 'JSON matrix object, e.g. {"include": [{"os":..,"target":..,"asset":..}, ..]}.'
        type: string
        required: true
      tag:
        description: 'Release tag override for workflow_dispatch rebuilds. Empty on release events (the event supplies it).'
        type: string
        default: ""
      toolchain:
        description: 'Rust toolchain to build with.'
        type: string
        default: "stable"
      gen-docs:
        description: 'Generate a man page and shell completions into the archive (binary must support --manpage/--completions).'
        type: boolean
        default: false
      include-files:
        description: 'Extra files to bundle into each archive (space-separated, e.g. "README.md LICENSE").'
        type: string
        default: ""
      publish-crates:
        description: 'Publish workspace crates to crates.io after the builds (real releases only; skipped on dispatch).'
        type: boolean
        default: false
      crates:
        description: 'Dependency-ordered crate names to publish (when publish-crates is true).'
        type: string
        default: ""
      tap-repo:
        description: 'owner/name of a Homebrew tap to refresh (empty = skip).'
        type: string
        default: ""
      tap-formula:
        description: 'Formula path within the tap, e.g. Formula/edikt.rb.'
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.targets) }}
    steps:
      # Build the tag's own code (matters on dispatch) so attached binaries
      # match the released source.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}
          targets: ${{ matrix.target }}

      # musl needs its C toolchain; non-native linux-aarch64 needs a cross linker.
      - name: Install musl tools
        if: endsWith(matrix.target, '-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        env:
          BIN: ${{ inputs.bin-name }}
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
          GEN_DOCS: ${{ inputs.gen-docs }}
          INCLUDE: ${{ inputs.include-files }}
        run: |
          set -euo pipefail
          bin="target/$TARGET/release/$BIN"
          staging="stage"
          mkdir -p "$staging"
          for f in $INCLUDE; do cp "$f" "$staging/" 2>/dev/null || true; done
          if [[ "$ASSET" == *.zip ]]; then
            cp "$bin.exe" "$staging/"
            (cd "$staging" && 7z a "$GITHUB_WORKSPACE/$ASSET" .)
          else
            cp "$bin" "$staging/"
            strip "$staging/$BIN" || true
            if [[ "$GEN_DOCS" == "true" ]]; then
              "$bin" --manpage > "$staging/$BIN.1"
              for shell in bash zsh fish; do
                "$bin" --completions "$shell" > "$staging/$BIN.$shell"
              done
            fi
            tar czf "$GITHUB_WORKSPACE/$ASSET" -C "$staging" .
          fi

      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload '${{ github.event.release.tag_name || inputs.tag }}' '${{ matrix.asset }}' --clobber
