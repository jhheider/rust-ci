name: CI

# Reusable fmt + clippy + test (+ optional coverage) for a Rust workspace.
# Deliberately has NO separate `cargo check` job: `cargo clippy --all-targets`
# with `-D warnings` compiles everything check would and then some, so a check
# job is pure wasted runner minutes.
on:
  workflow_call:
    inputs:
      os:
        description: 'JSON array of runner OSes for the test matrix.'
        type: string
        default: '["ubuntu-latest","macos-latest","windows-latest"]'
      toolchain:
        description: 'Rust toolchain (stable, nightly, 1.79.0, ...).'
        type: string
        default: "stable"
      rustflags:
        description: 'RUSTFLAGS for the clippy compile. Keep it lint-clean; do not add -A escapes; fix the code instead.'
        type: string
        default: "-D warnings"
      clippy-args:
        description: 'Arguments to `cargo clippy`.'
        type: string
        default: "--workspace --all-targets --all-features"
      test-args:
        description: 'Arguments to `cargo test`.'
        type: string
        default: "--workspace --all-features"
      coverage:
        description: 'Run cargo-llvm-cov and upload to Coveralls (advisory).'
        type: boolean
        default: false
      runs-on:
        description: 'Runner for the single-runner jobs (fmt, clippy, coverage). Use "self-hosted" to route a private repo to a self-hosted runner; the test matrix is chosen separately via `os`. Keep the default for public repos (free hosted minutes).'
        type: string
        default: "ubuntu-latest"
      system-packages:
        description: 'Space-separated apt packages to install on Linux runners before the compile steps (e.g. "libasound2-dev pkg-config" for a rodio/ALSA crate). Linux-only; ignored on macOS/Windows. Empty = install nothing.'
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: jhheider/rust-ci/actions/setup-rust@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          components: rustfmt
          cache: "false"
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: jhheider/rust-ci/actions/setup-rust@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          components: clippy
      - name: Install system packages (Linux)
        if: runner.os == 'Linux' && inputs.system-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.system-packages }}
      - run: cargo clippy ${{ inputs.clippy-args }}
        env:
          RUSTFLAGS: ${{ inputs.rustflags }}

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: jhheider/rust-ci/actions/setup-rust@v1
        with:
          toolchain: ${{ inputs.toolchain }}
      - name: Install system packages (Linux)
        if: runner.os == 'Linux' && inputs.system-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.system-packages }}
      - run: cargo test ${{ inputs.test-args }}

  coverage:
    name: Coverage
    if: ${{ inputs.coverage }}
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: jhheider/rust-ci/actions/setup-rust@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          components: llvm-tools-preview
          shared-key: coverage
      - name: Install system packages (Linux)
        if: runner.os == 'Linux' && inputs.system-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.system-packages }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --all-features --lcov --output-path coverage/lcov.info
      # Advisory: a Coveralls outage or an un-enrolled repo must not redden CI.
      - uses: coverallsapp/github-action@v2
        with:
          path-to-lcov: coverage/lcov.info
          fail-on-error: false
