name: Release

# Reusable release: build a binary per target, attach to the GitHub Release,
# then optionally publish crates and refresh a Homebrew tap formula. Callers
# wire `on: release: [published]` (and optionally a workflow_dispatch that
# passes `tag:` to rebuild an existing release). Everything a given repo does
# not need (docs, extra files, crates, tap) stays off by default.
#
# IMPORTANT: the CALLER must grant `permissions: contents: write` (to attach
# assets). A reusable workflow cannot request more permission than its caller
# holds - declaring it here would fail to load under a read-only default token.
# `targets` is a matrix object: {"include": [{os, target, asset}, ...]}.
on:
  workflow_call:
    inputs:
      bin-name:
        description: 'Built binary name(s) without extension. Space-separate several to bundle multiple binaries in one archive (e.g. "wf wayfinder-mcp"); gen-docs runs against the first name only.'
        type: string
        required: true
      targets:
        description: 'JSON matrix object, e.g. {"include": [{"os":..,"target":..,"asset":..}, ..]}. With multiple bin-name values, put a `{bin}` placeholder in each asset (e.g. "{bin}-linux-x86_64.tar.gz") so every binary gets its own archive.'
        type: string
        required: true
      tag:
        description: 'Release tag override for workflow_dispatch rebuilds. Empty on release events (the event supplies it).'
        type: string
        default: ""
      toolchain:
        description: 'Rust toolchain to build with.'
        type: string
        default: "stable"
      gen-docs:
        description: 'Generate a man page and shell completions into the primary (first-listed) binary''s archive (that binary must support --manpage/--completions).'
        type: boolean
        default: false
      include-files:
        description: 'Extra files to bundle into each archive (space-separated, e.g. "README.md LICENSE").'
        type: string
        default: ""
      system-packages:
        description: 'Space-separated apt packages to install on Linux build runners before compiling (e.g. "libasound2-dev pkg-config" for a rodio/ALSA crate). Linux-only; ignored on macOS/Windows. Empty = install nothing.'
        type: string
        default: ""
      features:
        description: 'Cargo features to build the release binaries with (space/comma-separated, e.g. "subscripts"). Empty builds default features.'
        type: string
        default: ""
      publish-crates:
        description: 'Publish workspace crates to crates.io after the builds (real releases only; skipped on dispatch).'
        type: boolean
        default: false
      crates:
        description: 'Dependency-ordered crate names to publish (when publish-crates is true).'
        type: string
        default: ""
      tap-repo:
        description: 'owner/name of a Homebrew tap to refresh (empty = skip).'
        type: string
        default: ""
      tap-formula:
        description: 'Formula path(s) within the tap, e.g. Formula/edikt.rb. Space-separate several (one per binary) to refresh a separate formula for each.'
        type: string
        default: ""
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false
      HOMEBREW_TAP_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.targets) }}
    steps:
      # Build the tag's own code (matters on dispatch) so attached binaries
      # match the released source.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}
          targets: ${{ matrix.target }}

      # Cross / musl toolchains for non-native-glibc linux targets: the action
      # installs the right linker (musl-gcc, aarch64 cross, ...). Native
      # x86_64-unknown-linux-gnu needs nothing.
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: contains(matrix.target, '-linux-') && matrix.target != 'x86_64-unknown-linux-gnu'
        with:
          target: ${{ matrix.target }}

      - name: Install system packages (Linux)
        if: runner.os == 'Linux' && inputs.system-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.system-packages }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ inputs.features != '' && format('--features {0}', inputs.features) || '' }}

      - name: Package and attach
        shell: bash
        env:
          BINS: ${{ inputs.bin-name }}
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
          GEN_DOCS: ${{ inputs.gen-docs }}
          INCLUDE: ${{ inputs.include-files }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          reldir="target/$TARGET/release"
          # First-listed binary is the "primary" (the CLI whose docs we generate).
          primary="${BINS%% *}"
          # With several binaries the asset name must vary per binary; a `{bin}`
          # placeholder in `asset` is substituted with each binary's name.
          if [[ "$(echo "$BINS" | wc -w)" -gt 1 && "$ASSET" != *"{bin}"* ]]; then
            echo "::error::multiple bin-name values require a {bin} placeholder in each asset name" >&2
            exit 1
          fi
          # One archive per binary, uploaded independently.
          for bin in $BINS; do
            asset="${ASSET//\{bin\}/$bin}"
            staging="stage-$bin"
            mkdir -p "$staging"
            for f in $INCLUDE; do cp "$f" "$staging/" 2>/dev/null || true; done
            if [[ "$asset" == *.zip ]]; then
              cp "$reldir/$bin.exe" "$staging/"
              (cd "$staging" && 7z a "$GITHUB_WORKSPACE/$asset" .)
            else
              cp "$reldir/$bin" "$staging/"
              strip "$staging/$bin" || true
              if [[ "$GEN_DOCS" == "true" && "$bin" == "$primary" ]]; then
                "$reldir/$bin" --manpage > "$staging/$bin.1"
                for shell in bash zsh fish; do
                  "$reldir/$bin" --completions "$shell" > "$staging/$bin.$shell"
                done
              fi
              tar czf "$GITHUB_WORKSPACE/$asset" -C "$staging" .
            fi
            gh release upload "$TAG" "$asset" --clobber
          done

  publish-crates:
    name: Publish to crates.io
    needs: build
    if: ${{ inputs.publish-crates && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}
      - uses: jhheider/rust-ci/actions/publish-crates@v1
        with:
          crates: ${{ inputs.crates }}
          token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  bump-formula:
    name: Refresh Homebrew formula
    needs: build
    if: ${{ inputs.tap-repo != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: jhheider/rust-ci/actions/bump-tap-formula@v1
        with:
          tag: ${{ github.event.release.tag_name || inputs.tag }}
          tap-repo: ${{ inputs.tap-repo }}
          formula-path: ${{ inputs.tap-formula }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
