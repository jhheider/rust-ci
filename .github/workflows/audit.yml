name: Security Audit

# Reusable cargo-audit via the prebuilt rustsec action - no `cargo install
# cargo-audit` compile on every run. Callers wire up the schedule/dispatch
# trigger; advisories rarely change between commits, so weekly is plenty.
on:
  workflow_call: {}

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
