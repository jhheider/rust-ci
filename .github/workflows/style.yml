name: Style

# Reusable prose gate: rejects em-dashes and en-dashes so the repo's text stays
# plain ASCII. The check lives in the `no-em-dash` composite action (a companion
# script, not an inline heredoc); this workflow is the turnkey wrapper. Callers
# wire the trigger; run it on every change so docs are gated too.
on:
  workflow_call:
    inputs:
      skip-prefixes:
        description: 'Whitespace-separated path prefixes to exempt (verbatim files like licenses, fixtures).'
        type: string
        default: "LICENSE"
      runs-on:
        description: 'Runner for the style job. Use "self-hosted" for a private repo; keep the default for public repos.'
        type: string
        default: "ubuntu-latest"

jobs:
  no-em-dash:
    name: no em-dashes
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v7
      - uses: jhheider/rust-ci/actions/no-em-dash@v1
        with:
          skip-prefixes: ${{ inputs.skip-prefixes }}
